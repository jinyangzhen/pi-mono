version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: tian-gong-postgres-dev
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: tian_gong
      POSTGRES_USER: tguser
      POSTGRES_PASSWORD: tgpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tguser -d tian_gong"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
